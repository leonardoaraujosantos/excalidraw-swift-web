# XcodeGen spec for the iOS app shell.
# Generate with: xcodegen generate  (produces ExcalidrawSwift.xcodeproj)
# The app is a thin host over the local SwiftPM package.
name: ExcalidrawSwift
options:
  bundleIdPrefix: ai.cyberdynecorp.excalidraw
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

# Automatic signing for device builds (the team is encoded here so `xcodegen`
# regeneration preserves it). Change `DEVELOPMENT_TEAM` for your own account.
settings:
  base:
    DEVELOPMENT_TEAM: 2C69VJZSNR
    CODE_SIGN_STYLE: Automatic

packages:
  ExcalidrawSwift:
    path: .

targets:
  ExcalidrawApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: ExcalidrawSwift
        product: ExcalidrawUI
      - package: ExcalidrawSwift
        product: ExcalidrawModel
      - package: ExcalidrawSwift
        product: ExcalidrawRender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdynecorp.excalidraw.app
        MARKETING_VERSION: "0.5.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "5.0"

  ExcalidrawAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppUITests
    dependencies:
      - target: ExcalidrawApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdynecorp.excalidraw.app.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

  # App-hosted unit tests: import the render modules and run rendering
  # benchmarks in-process so they can be measured on a real device.
  ExcalidrawAppBenchmarks:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppBenchmarks
    dependencies:
      - target: ExcalidrawApp
      - package: ExcalidrawSwift
        product: ExcalidrawRender
      - package: ExcalidrawSwift
        product: ExcalidrawMetal
      - package: ExcalidrawSwift
        product: ExcalidrawModel
      - package: ExcalidrawSwift
        product: ExcalidrawMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.cyberdynecorp.excalidraw.app.benchmarks
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.0"

schemes:
  ExcalidrawApp:
    build:
      targets:
        ExcalidrawApp: all
        ExcalidrawAppUITests: [test]
        ExcalidrawAppBenchmarks: [test]
    test:
      targets:
        - ExcalidrawAppUITests
        - ExcalidrawAppBenchmarks
      gatherCoverageData: true
