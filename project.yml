# XcodeGen spec for the iOS app shell.
# Generate with: xcodegen generate  (produces ExcalidrawSwift.xcodeproj)
# The app is a thin host over the local SwiftPM package.
name: ExcalidrawSwift
options:
  bundleIdPrefix: ai.amini.excalidraw
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ExcalidrawSwift:
    path: .

targets:
  ExcalidrawApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    dependencies:
      - package: ExcalidrawSwift
        product: ExcalidrawUI
      - package: ExcalidrawSwift
        product: ExcalidrawModel
      - package: ExcalidrawSwift
        product: ExcalidrawRender
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.amini.excalidraw.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_VERSION: "5.0"

  ExcalidrawAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AppUITests
    dependencies:
      - target: ExcalidrawApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.amini.excalidraw.app.uitests
        SWIFT_VERSION: "5.0"

schemes:
  ExcalidrawApp:
    build:
      targets:
        ExcalidrawApp: all
        ExcalidrawAppUITests: [test]
    test:
      targets:
        - ExcalidrawAppUITests
      gatherCoverageData: true
