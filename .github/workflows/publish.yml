name: Publish web packages

# Publishes the web npm packages to GitHub Packages when a version tag is pushed
# (e.g. `git tag 0.3.0 && git push origin 0.3.0`). The Swift package needs no
# publish step — SwiftPM resolves the git tag directly.
#
# Auth: the packages are scoped @cyberdynecorp and this repo lives in the
# CyberdyneCorp org, so the automatic GITHUB_TOKEN can publish them directly
# (job `permissions: packages: write`). No PAT/secret needed.

on:
  push:
    tags:
      - "*.*.*" # e.g. 0.3.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          registry-url: "https://npm.pkg.github.com"
          scope: "@cyberdynecorp"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:libs
      # Gate the release on a green build before anything is published.
      - run: pnpm typecheck
      - run: pnpm test
      - name: Verify the git tag matches the package versions
        run: |
          tag="${GITHUB_REF_NAME}"
          for pkg in packages/excalidraw-svelte packages/excalidraw-yjs server; do
            v=$(node -p "require('./$pkg/package.json').version")
            if [ "$tag" != "$v" ]; then
              echo "::error::tag $tag does not match $pkg version $v"; exit 1
            fi
          done
      - run: pnpm publish:libs
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
