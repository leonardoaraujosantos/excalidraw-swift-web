name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build & test (SwiftPM, coverage gate)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test with coverage gate (>=90%)
        run: ./scripts/coverage.sh 90

  lint:
    name: SwiftLint & SwiftFormat
    runs-on: macos-15
    # Advisory until the formatters are validated against the codebase; the
    # build/coverage and app jobs are the blocking gates.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: brew install swiftlint swiftformat
      - name: SwiftLint
        run: swiftlint lint --strict
      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

  app:
    name: Build app & UI tests (iOS simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick an iOS simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E 'iPhone' | head -1 | sed -E 's/ \(.*//' | xargs)
          echo "Using simulator: ${DEVICE}"
          echo "device=${DEVICE}" >> "$GITHUB_OUTPUT"

      - name: Build & run UI tests
        run: |
          xcodebuild test \
            -project ExcalidrawSwift.xcodeproj \
            -scheme ExcalidrawApp \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO | xcpretty || exit ${PIPESTATUS[0]}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: TestResults.xcresult
